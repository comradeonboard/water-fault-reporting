<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account | Water Fault Reporting</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo">💧</div>
      <div>
        <h1>Water Fault Reporting</h1>
        <p>Sign in or create your account to manage reports.</p>
      </div>
    </div>
  </header>

  <main>
    <section class="auth-panel">
      <div class="auth-card">
        <h2>Welcome back</h2>
        <p>Login to view your fault reports and submit new issues.</p>
        <form id="loginForm">
          <div class="form-row">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" required />
          </div>
          <div class="form-row">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" type="password" required />
          </div>
          <button type="submit" class="button button-primary">Login</button>
        </form>
      </div>

      <div class="auth-card">
        <h2>Create account</h2>
        <p>Register and start reporting water faults right away.</p>
        <form id="registerForm">
          <div class="form-row">
            <label for="registerName">Name</label>
            <input id="registerName" type="text" required />
          </div>
          <div class="form-row">
            <label for="registerEmail">Email</label>
            <input id="registerEmail" type="email" required />
          </div>
          <div class="form-row">
            <label for="registerPassword">Password</label>
            <input id="registerPassword" type="password" required />
          </div>
          <button type="submit" class="button button-secondary">Register</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Water Fault Reporting System &mdash; citizen fault submission demo</p>
  </footer>

  <script src="auth.js"></script>
</body>
</html>
